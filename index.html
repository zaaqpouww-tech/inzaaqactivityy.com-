<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKL Dashboard | Personal Tracking</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-circle">
                    <i data-lucide="layout-dashboard"></i>
                </div>
                <span class="logo-text">PKL Dashboard</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i data-lucide="home"></i>
                    <span>Ringkasan</span>
                </a>
                <a href="#" class="nav-item" data-view="logs">
                    <i data-lucide="book-open"></i>
                    <span>Jurnal PKL</span>
                </a>
                <a href="#" class="nav-item" data-view="profile">
                    <i data-lucide="user"></i>
                    <span>Profil Saya</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">Z</div>
                    <div class="user-details">
                        <p class="user-name">Zaki</p>
                        <p class="user-role">Siswa PKL</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Cari kegiatan..." id="globalSearch">
                </div>
                <div class="top-bar-actions">
                    <button id="addLogBtn" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        <span>Tambah Data</span>
                    </button>
                    <button class="btn btn-icon theme-toggle">
                        <i data-lucide="moon"></i>
                    </button>
                </div>
            </header>

            <div id="contentArea">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="logModal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modalTitle">Tambah Jurnal PKL</h2>
                <button class="close-modal"><i data-lucide="x"></i></button>
            </div>
            <form id="logForm">
                <input type="hidden" id="logId">
                <div class="form-group">
                    <label for="logDate">Tanggal</label>
                    <input type="date" id="logDate" required>
                </div>
                <div class="form-group">
                    <label for="logActivity">Kegiatan</label>
                    <input type="text" id="logActivity" placeholder="Apa yang Anda lakukan hari ini?" required>
                </div>
                <div class="form-group">
                    <label for="logStatus">Status</label>
                    <select id="logStatus">
                        <option value="Selesai">Selesai</option>
                        <option value="Dalam Proses">Dalam Proses</option>
                        <option value="Revisi">Revisi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="logNote">Catatan/Keterangan</label>
                    <textarea id="logNote" rows="4" placeholder="Detail kegiatan..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
